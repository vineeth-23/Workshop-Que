services:
  - type: web
    name: workshop-que
    env: python
    plan: free
    buildCommand: ""
    startCommand: "python server.py"
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.4-mini
      - key: COMFY_API_KEY
        sync: false
      - key: COMFY_BASE_URL
        value: https://cloud.comfy.org
